metrics:
  - {name: gross_revenue, type: simple, description: "Gross order revenue.", type_params: {measure: order_gross_amount}}
  - {name: net_revenue, type: simple, description: "Net booked revenue.", type_params: {measure: order_net_booked_amount}}
  - {name: orders, type: simple, type_params: {measure: orders_count}}
  - {name: units_sold, type: simple, description: "Units sold.", type_params: {measure: quantity}}
  - {name: aov, type: ratio, description: "Average order value (net revenue / orders).", type_params: {numerator: net_revenue, denominator: orders}}
  - {name: units_per_order, type: ratio, description: "Units per order (cross-table).", type_params: {numerator: units_sold, denominator: orders}}
