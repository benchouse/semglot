models:
  - name: fct_orders
    description: Order-grain finance fact. One row per order.
    columns:
      - name: order_id
        description: Order surrogate key.
        data_type: number
        constraints:
          - type: primary_key
      - name: customer_sk
        description: Customer the order belongs to.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_sk
      - name: is_refunded
        description: Whether the order was refunded.
        data_type: boolean
      - name: order_date
        description: Date the order was placed.
        data_type: date
      - name: order_gross
        description: Gross order revenue before tax and refunds.
        data_type: number
      - name: order_net_booked
        description: Net booked revenue (gross minus tax and refunds).
        data_type: number
      - name: channel_id
        description: Sales channel the order came through.
        data_type: number
        data_tests:
          # dbt 1.8+ nests the test args under `arguments:`.
          - relationships:
              arguments:
                to: ref('dim_channel')
                field: channel_id
      - name: aov
        description: Precomputed average order value; superseded by the computed aov metric.
        data_type: double

  - name: fct_order_lines
    description: Order-line grain. One row per line item.
    columns:
      - name: order_line_id
        description: Line-item surrogate key.
        data_type: number
        constraints:
          - type: primary_key
      - name: order_id
        description: Order the line belongs to.
        data_type: number
        data_tests:
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: product_id
        description: Product sold on the line.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: order_date
        description: Date the parent order was placed.
        data_type: date
      - name: quantity
        description: Units sold on the line.
        data_type: number
      - name: net_line_revenue
        description: Net revenue for the line.
        data_type: number

  - name: dim_customer
    description: Customer dimension.
    columns:
      - name: customer_sk
        description: Customer surrogate key.
        data_type: number
        constraints:
          - type: primary_key
      - name: customer_segment
        description: Marketing segment.
        data_type: varchar
        data_tests:
          - accepted_values:
              arguments:
                values: [new, returning, vip]
        meta:
          synonyms: [segment, customer_type]
          enum:
            new: "First-ever order not yet placed or just placed"
            returning: "Has ordered before"
            vip: "High-value repeat customer"
            prospect: "Signed up, never ordered"   # meta-only: exercises the superset
      - name: accepts_marketing
        description: Whether the customer opted in to marketing.
        data_type: boolean

  - name: dim_product
    description: Product dimension.
    columns:
      - name: product_id
        description: Product surrogate key.
        data_type: number
        constraints:
          - type: primary_key
      - name: category
        description: Product category.
        data_type: varchar
      - name: title
        description: Product title.
        data_type: varchar

  # obt_sales: wide order-line OBT with measures but no metric referencing them
  # (measures-only table, no metrics.yml entry). Exercises databricks-metric-view
  # emitting raw measures from ir.Measure when a table has no metrics.
  - name: obt_sales
    description: Wide sales table at order-line grain. One row per order line. Measures only, no metrics.
    columns:
      - name: order_line_id
        description: Line-item surrogate key.
        data_type: number
        constraints:
          - type: primary_key
      - name: order_id
        description: Order the line belongs to.
        data_type: number
        data_tests:
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: order_date
        description: Date the order was placed.
        data_type: date
      - name: customer_segment
        description: Marketing segment.
        data_type: varchar
      - name: is_refunded
        description: Whether the order line was refunded.
        data_type: boolean
      - name: quantity
        description: Units sold on the line.
        data_type: number
      - name: net_revenue
        description: Net revenue for the line.
        data_type: number

  # A classic models:-only mart (no semantic_model): exercises a table whose PK
  # is declared the dbt-idiomatic way (unique + not_null), not a constraint.
  - name: dim_channel
    description: Sales channel dimension.
    columns:
      - name: channel_id
        description: Channel surrogate key.
        data_type: number
        data_tests: [unique, not_null]
      - name: channel_name
        description: Channel display name.
        data_type: varchar
