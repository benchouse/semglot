version: "1.1"
comment: 'Order-line grain. One row per line item. Note: metric units_per_order: references a measure on another table (cross-grain), not expressible as a single-grain metric-view measure'
source: analytics.main.fct_order_lines
joins:
  - name: fct_orders
    source: analytics.main.fct_orders
    "on": source.order_id = fct_orders.order_id
  - name: dim_product
    source: analytics.main.dim_product
    "on": source.product_id = dim_product.product_id
fields:
  - name: order_line_id
    expr: order_line_id
    comment: Line-item surrogate key.
  - name: order_id
    expr: order_id
    comment: Order the line belongs to.
  - name: product_id
    expr: product_id
    comment: Product sold on the line.
  - name: order_date
    expr: order_date
    comment: Date the parent order was placed.
  - name: fct_orders_order_id
    expr: fct_orders.order_id
    comment: Order surrogate key.
  - name: customer_sk
    expr: fct_orders.customer_sk
    comment: Customer the order belongs to.
  - name: is_refunded
    expr: fct_orders.is_refunded
    comment: Whether the order was refunded.
  - name: channel_id
    expr: fct_orders.channel_id
    comment: Sales channel the order came through.
  - name: aov
    expr: fct_orders.aov
    comment: Precomputed average order value; superseded by the computed aov metric.
  - name: fct_orders_order_date
    expr: fct_orders.order_date
    comment: Date the order was placed.
  - name: dim_product_product_id
    expr: dim_product.product_id
    comment: Product surrogate key.
  - name: category
    expr: dim_product.category
    comment: Product category.
  - name: title
    expr: dim_product.title
    comment: Product title.
measures:
  - name: units_sold
    expr: sum(quantity)
    comment: Units sold.
    display_name: Units sold
  - name: net_line_revenue
    expr: sum(net_line_revenue)
    comment: Net revenue for the line.
