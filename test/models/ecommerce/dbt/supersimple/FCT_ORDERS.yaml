# yaml-language-server: $schema=https://assets.supersimple.io/configuration_schema/1.0.0/supersimple_configuration_schema.json
models:
  FCT_ORDERS:
    name: Orders
    table: MAIN.FCT_ORDERS
    primary_key:
      - ORDER_ID
    description: Order-grain finance fact. One row per order.
    properties:
      CUSTOMER_SK:
        name: CUSTOMER_SK
        type: Number
        description: Customer the order belongs to.
      IS_REFUNDED:
        name: IS_REFUNDED
        type: Boolean
        description: Whether the order was refunded.
      ORDER_DATE:
        name: ORDER_DATE
        type: Date
        description: Date the order was placed.
      ORDER_GROSS:
        name: ORDER_GROSS
        type: Number
        description: Gross order revenue before tax and refunds.
      ORDER_ID:
        name: ORDER_ID
        type: Number
        description: Order surrogate key.
      ORDER_NET_BOOKED:
        name: ORDER_NET_BOOKED
        type: Number
        description: Net booked revenue (gross minus tax and refunds).
      REFUNDED_ORDERS:
        name: REFUNDED_ORDERS
        type: Number
        sql: case when {is_refunded} then 1 else 0 end
    relations:
      order_lines:
        name: Order lines
        type: hasMany
        model_id: FCT_ORDER_LINES
        join_strategy:
          join_key: ORDER_ID
metrics:
  aov:
    name: Average order value
    model_id: FCT_ORDERS
    description: Average order value (net revenue / orders).
    operations:
      - operation: groupAggregate
        parameters:
          groups: []
          aggregations:
            - type: sum
              key: ORDER_NET_BOOKED
              property:
                key: _num
                name: _num
            - type: count_distinct
              key: ORDER_ID
              property:
                key: _den
                name: _den
      - operation: deriveField
        parameters:
          field_name: Average order value
          key: aov
          value:
            expression: prop("_num") / prop("_den")
            version: "1"
    aggregation:
      type: first
      key: aov
      property:
        key: aov
        name: Average order value
  gross_revenue:
    name: Gross revenue
    model_id: FCT_ORDERS
    description: Gross order revenue.
    aggregation:
      type: sum
      key: ORDER_GROSS
  net_revenue:
    name: Net revenue
    model_id: FCT_ORDERS
    description: Net booked revenue.
    aggregation:
      type: sum
      key: ORDER_NET_BOOKED
  orders:
    name: Orders
    model_id: FCT_ORDERS
    aggregation:
      type: count_distinct
      key: ORDER_ID
  refund_rate:
    name: Refund rate
    model_id: FCT_ORDERS
    description: Refunded orders / all orders.
    operations:
      - operation: groupAggregate
        parameters:
          groups: []
          aggregations:
            - type: sum
              key: REFUNDED_ORDERS
              property:
                key: _num
                name: _num
            - type: count_distinct
              key: ORDER_ID
              property:
                key: _den
                name: _den
      - operation: deriveField
        parameters:
          field_name: Refund rate
          key: refund_rate
          value:
            expression: prop("_num") / prop("_den")
            version: "1"
    aggregation:
      type: first
      key: refund_rate
      property:
        key: refund_rate
        name: Refund rate
  refunded_orders:
    name: Refunded orders
    model_id: FCT_ORDERS
    description: Count of refunded orders.
    aggregation:
      type: sum
      key: REFUNDED_ORDERS
  units_per_order:
    name: Units per order
    model_id: FCT_ORDERS
    description: Units per order (cross-table).
    operations:
      - operation: relationAggregate
        parameters:
          relation:
            key: order_lines
          aggregations:
            - type: sum
              key: QUANTITY
              property:
                key: _num_rel
                name: _num_rel
      - operation: groupAggregate
        parameters:
          groups: []
          aggregations:
            - type: sum
              key: _num_rel
              property:
                key: _num
                name: _num
            - type: count_distinct
              key: ORDER_ID
              property:
                key: _den
                name: _den
      - operation: deriveField
        parameters:
          field_name: Units per order
          key: units_per_order
          value:
            expression: prop("_num") / prop("_den")
            version: "1"
    aggregation:
      type: first
      key: units_per_order
      property:
        key: units_per_order
        name: Units per order
