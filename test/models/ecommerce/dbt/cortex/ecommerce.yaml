name: ecommerce
tables:
  - name: fct_orders
    description: Order-grain finance fact. One row per order.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: FCT_ORDERS
    primary_key:
      columns:
        - ORDER_ID
    dimensions:
      - name: order_id
        expr: ORDER_ID
        data_type: NUMBER
      - name: customer_sk
        expr: CUSTOMER_SK
        data_type: NUMBER
      - name: is_refunded
        expr: IS_REFUNDED
        data_type: BOOLEAN
    time_dimensions:
      - name: order_date
        expr: ORDER_DATE
        data_type: DATE
    facts:
      - name: order_gross_amount
        expr: ORDER_GROSS
        data_type: NUMBER
      - name: order_net_booked_amount
        expr: ORDER_NET_BOOKED
        data_type: NUMBER
      - name: orders_count
        expr: ORDER_ID
        data_type: NUMBER
    metrics:
      - name: gross_revenue
        expr: SUM(FCT_ORDERS.ORDER_GROSS)
        description: Gross order revenue.
      - name: net_revenue
        expr: SUM(FCT_ORDERS.ORDER_NET_BOOKED)
        description: Net booked revenue.
      - name: orders
        expr: COUNT(DISTINCT FCT_ORDERS.ORDER_ID)
      - name: aov
        expr: SUM(FCT_ORDERS.ORDER_NET_BOOKED) / COUNT(DISTINCT FCT_ORDERS.ORDER_ID)
        description: Average order value (net revenue / orders).
  - name: fct_order_lines
    description: Order-line grain. One row per line item.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: FCT_ORDER_LINES
    primary_key:
      columns:
        - ORDER_LINE_ID
    dimensions:
      - name: order_line_id
        expr: ORDER_LINE_ID
        data_type: NUMBER
      - name: order_id
        expr: ORDER_ID
        data_type: NUMBER
      - name: product_id
        expr: PRODUCT_ID
        data_type: NUMBER
    time_dimensions:
      - name: order_date
        expr: ORDER_DATE
        data_type: DATE
    facts:
      - name: quantity
        expr: QUANTITY
        data_type: NUMBER
      - name: net_line_revenue
        expr: NET_LINE_REVENUE
        data_type: NUMBER
    metrics:
      - name: units_sold
        expr: SUM(FCT_ORDER_LINES.QUANTITY)
        description: Units sold.
      - name: units_per_order
        expr: SUM(FCT_ORDER_LINES.QUANTITY) / COUNT(DISTINCT FCT_ORDERS.ORDER_ID)
        description: Units per order (cross-table).
  - name: dim_customer
    description: Customer dimension.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: DIM_CUSTOMER
    primary_key:
      columns:
        - CUSTOMER_SK
    dimensions:
      - name: customer_sk
        expr: CUSTOMER_SK
        data_type: NUMBER
      - name: customer_segment
        expr: CUSTOMER_SEGMENT
        data_type: TEXT
      - name: accepts_marketing
        expr: ACCEPTS_MARKETING
        data_type: TEXT
  - name: dim_product
    description: Product dimension.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: DIM_PRODUCT
    primary_key:
      columns:
        - PRODUCT_ID
    dimensions:
      - name: product_id
        expr: PRODUCT_ID
        data_type: NUMBER
      - name: category
        expr: CATEGORY
        data_type: TEXT
      - name: title
        expr: TITLE
        data_type: TEXT
relationships:
  - name: fct_orders_to_dim_customer
    left_table: fct_orders
    right_table: dim_customer
    relationship_columns:
      - left_column: CUSTOMER_SK
        right_column: CUSTOMER_SK
  - name: fct_order_lines_to_fct_orders
    left_table: fct_order_lines
    right_table: fct_orders
    relationship_columns:
      - left_column: ORDER_ID
        right_column: ORDER_ID
  - name: fct_order_lines_to_dim_product
    left_table: fct_order_lines
    right_table: dim_product
    relationship_columns:
      - left_column: PRODUCT_ID
        right_column: PRODUCT_ID
