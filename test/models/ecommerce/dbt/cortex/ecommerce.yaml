name: ecommerce
tables:
  - name: fct_orders
    description: Order-grain finance fact. One row per order.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: FCT_ORDERS
    primary_key:
      columns:
        - ORDER_ID
    dimensions:
      - name: order_id
        expr: ORDER_ID
        data_type: NUMBER
        description: Order surrogate key.
      - name: customer_sk
        expr: CUSTOMER_SK
        data_type: NUMBER
        description: Customer the order belongs to.
      - name: is_refunded
        expr: IS_REFUNDED
        data_type: BOOLEAN
        description: Whether the order was refunded.
      - name: channel_id
        expr: CHANNEL_ID
        data_type: NUMBER
        description: Sales channel the order came through.
    time_dimensions:
      - name: order_date
        expr: ORDER_DATE
        data_type: DATE
        description: Date the order was placed.
    facts:
      - name: order_gross_amount
        expr: ORDER_GROSS
        data_type: NUMBER
        description: Gross order revenue before tax and refunds.
      - name: order_net_booked_amount
        expr: ORDER_NET_BOOKED
        data_type: NUMBER
        description: Net booked revenue (gross minus tax and refunds).
      - name: orders_count
        expr: ORDER_ID
        data_type: NUMBER
      - name: refunded_orders_count
        expr: CASE WHEN IS_REFUNDED THEN 1 ELSE 0 END
        data_type: NUMBER
    metrics:
      - name: gross_revenue
        expr: SUM(FCT_ORDERS.ORDER_GROSS)
        description: Gross order revenue.
      - name: net_revenue
        expr: SUM(FCT_ORDERS.ORDER_NET_BOOKED)
        description: Net booked revenue.
      - name: orders
        expr: COUNT(DISTINCT FCT_ORDERS.ORDER_ID)
      - name: refunded_orders
        expr: SUM(CASE WHEN FCT_ORDERS.IS_REFUNDED THEN 1 ELSE 0 END)
        description: Count of refunded orders.
      - name: aov
        expr: SUM(FCT_ORDERS.ORDER_NET_BOOKED) / COUNT(DISTINCT FCT_ORDERS.ORDER_ID)
        description: Average order value (net revenue / orders).
      - name: refund_rate
        expr: SUM(CASE WHEN FCT_ORDERS.IS_REFUNDED THEN 1 ELSE 0 END) / COUNT(DISTINCT FCT_ORDERS.ORDER_ID)
        description: Refunded orders / all orders.
  - name: fct_order_lines
    description: Order-line grain. One row per line item.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: FCT_ORDER_LINES
    primary_key:
      columns:
        - ORDER_LINE_ID
    dimensions:
      - name: order_line_id
        expr: ORDER_LINE_ID
        data_type: NUMBER
        description: Line-item surrogate key.
      - name: order_id
        expr: ORDER_ID
        data_type: NUMBER
        description: Order the line belongs to.
      - name: product_id
        expr: PRODUCT_ID
        data_type: NUMBER
        description: Product sold on the line.
    time_dimensions:
      - name: order_date
        expr: ORDER_DATE
        data_type: DATE
        description: Date the parent order was placed.
    facts:
      - name: quantity
        expr: QUANTITY
        data_type: NUMBER
        description: Units sold on the line.
      - name: net_line_revenue
        expr: NET_LINE_REVENUE
        data_type: NUMBER
        description: Net revenue for the line.
    metrics:
      - name: units_sold
        expr: SUM(FCT_ORDER_LINES.QUANTITY)
        description: Units sold.
      - name: units_per_order
        expr: SUM(FCT_ORDER_LINES.QUANTITY) / COUNT(DISTINCT FCT_ORDERS.ORDER_ID)
        description: Units per order (cross-table).
  - name: dim_customer
    description: Customer dimension.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: DIM_CUSTOMER
    primary_key:
      columns:
        - CUSTOMER_SK
    dimensions:
      - name: customer_sk
        expr: CUSTOMER_SK
        data_type: NUMBER
        description: Customer surrogate key.
      - name: customer_segment
        expr: CUSTOMER_SEGMENT
        data_type: TEXT
        description: 'Marketing segment. Values: new = First-ever order not yet placed or just placed; returning = Has ordered before; vip = High-value repeat customer; prospect = Signed up, never ordered.'
        synonyms:
          - segment
          - customer_type
        sample_values:
          - new
          - returning
          - vip
          - prospect
      - name: accepts_marketing
        expr: ACCEPTS_MARKETING
        data_type: BOOLEAN
        description: Whether the customer opted in to marketing.
  - name: dim_product
    description: Product dimension.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: DIM_PRODUCT
    primary_key:
      columns:
        - PRODUCT_ID
    dimensions:
      - name: product_id
        expr: PRODUCT_ID
        data_type: NUMBER
        description: Product surrogate key.
      - name: category
        expr: CATEGORY
        data_type: TEXT
        description: Product category.
      - name: title
        expr: TITLE
        data_type: TEXT
        description: Product title.
  - name: dim_channel
    description: Sales channel dimension.
    base_table:
      database: ANALYTICS
      schema: MAIN
      table: DIM_CHANNEL
    primary_key:
      columns:
        - CHANNEL_ID
    dimensions:
      - name: channel_id
        expr: CHANNEL_ID
        data_type: NUMBER
        description: Channel surrogate key.
      - name: channel_name
        expr: CHANNEL_NAME
        data_type: TEXT
        description: Channel display name.
relationships:
  - name: fct_orders_to_dim_customer
    left_table: fct_orders
    right_table: dim_customer
    relationship_columns:
      - left_column: CUSTOMER_SK
        right_column: CUSTOMER_SK
  - name: fct_order_lines_to_fct_orders
    left_table: fct_order_lines
    right_table: fct_orders
    relationship_columns:
      - left_column: ORDER_ID
        right_column: ORDER_ID
  - name: fct_order_lines_to_dim_product
    left_table: fct_order_lines
    right_table: dim_product
    relationship_columns:
      - left_column: PRODUCT_ID
        right_column: PRODUCT_ID
  - name: fct_orders_to_dim_channel
    left_table: fct_orders
    right_table: dim_channel
    relationship_columns:
      - left_column: CHANNEL_ID
        right_column: CHANNEL_ID
